<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galender - Markdown Calendar</title>
    <!-- Modern premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="auth-container" id="auth-container">
        <div class="auth-box glass-panel">
            <h1 class="logo">Galender.</h1>
            <p class="subtitle">Your Markdown Calendar</p>

            <!-- Auth Tabs -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-login" style="cursor:default;">User Login</button>
            </div>

            <form id="auth-form">
                <div class="input-group">
                    <input type="text" id="username" name="username" required autocomplete="off" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="password" name="password" required placeholder="Password">
                </div>

                <div id="error-message" class="error-msg hidden"></div>
                <div id="success-message" class="success-msg hidden"></div>

                <button type="submit" id="submit-btn" class="primary-btn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Main Application UI -->
    <div class="app-container hidden" id="app-container">
        <header class="app-header glass-panel">
            <h1 class="logo small-logo">Galender.</h1>
            <div class="user-controls">
                <button id="nav-calendar-btn" class="icon-btn"
                    style="width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center;"
                    title="Calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></button>
                <button class="icon-btn theme-toggle-btn"
                    style="width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center;"
                    title="Toggle Theme"></button>
                <span id="welcome-msg" class="welcome-msg"></span>
                <button id="logout-btn" class="outline-btn">Logout</button>
            </div>
        </header>

        <main class="main-layout">
            <!-- Calendar View -->
            <section class="calendar-section glass-panel">
                <div class="calendar-header">
                    <button id="prev-month" class="icon-btn">&lt;</button>
                    <h2 id="month-year-display"></h2>
                    <button id="next-month" class="icon-btn">&gt;</button>
                </div>
                <div class="calendar-grid weekdays">
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                    <div>Sun</div>
                </div>
                <div class="calendar-grid days" id="calendar-days">
                    <!-- Dynamic days will be injected here -->
                </div>
            </section>

            <!-- Editor View -->
            <section class="editor-section glass-panel hidden-pane" id="editor-section">
                <div class="editor-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <h2 id="selected-date-display" class="back-title" title="Go back to Calendar">Select a date</h2>
                        <span id="save-status" class="status-msg"></span>
                    </div>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div class="tabs editor-tabs">
                            <button class="tab-btn active" id="tab-edit">Edit</button>
                            <button class="tab-btn" id="tab-preview">Preview</button>
                        </div>
                    </div>
                </div>
                <div class="editor-body">
                    <textarea id="markdown-input" class="markdown-input" spellcheck="false"
                        placeholder="Start writing your notes..."></textarea>
                    <div id="markdown-preview" class="markdown-preview hidden"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Admin Panel UI -->
    <div class="app-container hidden" id="admin-container">
        <header class="app-header glass-panel">
            <h1 class="logo small-logo">Galender Admin.</h1>
            <div class="user-controls">
                <button class="icon-btn theme-toggle-btn"
                    style="width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center;"
                    title="Toggle Theme">☀️</button>
                <span class="welcome-msg">Super Administrator</span>
                <button id="admin-logout-btn" class="outline-btn">Logout</button>
            </div>
        </header>

        <main class="main-layout" style="grid-template-columns: 1fr; display: flex; flex-direction: column;">
            <div class="glass-panel" style="padding: 30px; margin-bottom: 20px;">
                <h2 style="margin-bottom: 20px;">User Management</h2>

                <form id="create-user-form"
                    style="display: flex; gap: 15px; margin-bottom: 30px; align-items: flex-end;">
                    <div class="input-group" style="margin-bottom: 0; flex-grow: 1;">
                        <input type="text" id="new-username" required placeholder="New Username">
                    </div>
                    <div class="input-group" style="margin-bottom: 0; flex-grow: 1;">
                        <input type="password" id="new-password" required placeholder="Initial Password">
                    </div>
                    <button type="submit" class="primary-btn"
                        style="width: auto; height: 50px; margin-top: 0; padding: 0 30px;">Add User</button>
                </form>

                <div id="admin-status" class="status-msg"></div>

                <div style="overflow-x: auto;">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
